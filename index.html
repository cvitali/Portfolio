<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portfolio</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/site.css">
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/projects.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Just+Me+Again+Down+Here&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar">
            <div class="navbar__background color-lilac">
                <div class="nav">
                    <div class="navbar__name">
                        <a class="navbar__link" href="index.html">Corinne VITALI</a>
                    </div>
                    <div class="navbar__links js-navItems js-navItems-hidden ">
                        <a class="navbar__link" href="#">A propos</a>
                        <a class="navbar__link" href="#">Projets</a>
                        <a class="navbar__link" href="#">Contact</a>
                    </div>
                    <div class="navbar__settings js-navItems js-navItems-hidden">
                        <select class="navbar__selectLanguage js-selectLanguage" name="language" id="language">
                            <option value="en">EN</option>
                            <option value="fr" selected>FR</option>
                        </select>
                        <div class="navbar__dark-mode">
                            <label for="dark-mode" class="dark-mode__button">
                                <input class="dark-mode__radio js-dark-mode" type="radio" id="darkMode__off" name="darkMode" checked >
                                <input class="dark-mode__radio js-dark-mode" type="radio" id="darkMode__on" name="darkMode" >
                            </label>
                            <p>Mode sombre</p>
                        </div>
                    </div>
                </div>
                <div class="burger js-burger">
                    <span class="burger__line"></span>
                    <span class="burger__line"></span>
                    <span class="burger__line"></span>
                </div>
            </div>
        </nav>
        <main>
            <section class="presentation">
                <div class="presentation__1">
                    <div class="presentation__text">
                        <h3 data-i18="hero_title1"></h3>
                        <h1 data-i18="hero_title2"></h1>
                        <h4 data-i18="hero_subtitle"></h4>
                        <p data-i18="hero_text1"></p>
                    </div>
                    <div class="presentation__image">
                        <img src="../assets/images/undraw_proud-coder_bivp.png" alt="Dessin d'une développeuse" width="100%" height="100%">
                    </div>
                </div>
                <div class="presentation__2">
                        <div class="presentation__image">
                            <img src="../assets/images/coder_1.png" alt="Dessin d'une développeuse" width="100%" height="100%">
                        </div>
                        <div data-i18="hero_text2" class="presentation__text"></div>
                </div>                                
                <div data-i18="hero_text3" class="presentation__text presentation__3"></div>
            </section>
            <section class="strengths">
                <div class="strengths__text">
                    <h3 data-i18="sectionStrengths_title"></h3>
                    <h2 data-i18="sectionStrengths_subtitle"></h2>
                    <p data-i18="sectionStrengths_text"></p>
                </div>
                <div class="strengths__image">
                    <img src="../assets/images/customer-centricity.png" alt="Dessin customer-centricity" width="100%" height="100%">
                </div>
            </section>
            <section class="projects">
                <h3 data-i18="sectionProjects_title"></h3>
                <h2 data-i18="sectionProjects_subtitle"></h2>
                <p data-i18="sectionProjects_text"></p>
                <div class="projects__cards">
                    <div data-i18="sectionProjects_listem1" class="projects__card"></div>
                    <div data-i18="sectionProjects_listem2" class="projects__card"></div>
                    <div data-i18="sectionProjects_listem3" class="projects__card"></div>
                    <div data-i18="sectionProjects_listem3" class="projects__card"></div>
                </div>
            </section>
            <section class="contact">
                <h3 data-i18="sectionContact_title"></h3>
                <h2 data-i18="sectionContact_subtitle"></h2>
                <p data-i18="sectionContact_text" class="contact__text"></p>
            </section>
        </main>
    </body>
    <script src="../js/site.js"></script>
</html>
